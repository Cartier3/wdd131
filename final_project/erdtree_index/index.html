<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
    <title>The Erdtree Index</title>
    <meta name="description" content="This is a fan-made site that indexes the bosses, weapons, and enemy types of the hit video game, Elden Ring!">
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
</head>
<body>
    <header>
        
        <h1>The Erdtree Index</h1>
        
        <img src="images/erdtree_index_logo_comp.png" alt="Logo image" class= "site-logo">

    </header>
    
    <main>

        <div id="entry-of-the-day">

            <h2>Entry of the Day:</h2>
            <div id="entryotd-content"></div>

        </div>

        <div class="container" id="search-area">
            
            <label for="filter-select" class="visually-hidden">Filter by category</label>

            <select id="filter-select">
                <option value="all">All</option>
                <option value="weapon">Weapon</option>
                <option value="boss">Boss</option>
                <option value="enemy">Enemy</option>
                <option value="item">Item</option>   
            </select>
            
            <img class="search-img" src="images/search-icon-fancy.png" alt="Search Bar Icon">

            <input type="text" id="search-input" placeholder="Search for any weapon, boss, enemy, or item.">

            <button id="submit-button">Submit</button>

        </div>

        <div id="results-container"></div>

    </main>
</body>
</html>
